<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exibição de Anúncios - MobBetApp</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
            position: relative;
            overflow-x: hidden;
        }

        /* Animação de fundo */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 107, 107, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(74, 144, 226, 0.3) 0%, transparent 50%);
            animation: gradient 15s ease infinite;
            z-index: 0;
        }

        @keyframes gradient {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(180deg); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideInDown 0.8s ease-out;
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .points-display {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .points-label {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .points-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #4ade80;
        }

        .ads-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .ad-network-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            animation: slideInUp 0.8s ease-out;
            transition: transform 0.3s ease;
        }

        .ad-network-card:hover {
            transform: translateY(-5px);
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .network-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .network-title.admob::before {
            content: '📱';
            font-size: 1.8rem;
        }

        .network-title.max::before {
            content: '🎯';
            font-size: 1.8rem;
        }

        .ad-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .ad-button {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 16px 24px;
            border-radius: 15px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .ad-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(102, 126, 234, 0.4);
        }

        .ad-button:active {
            transform: translateY(0);
        }

        .ad-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .ad-button.rewarded {
            background: linear-gradient(45deg, #4ade80, #22c55e);
            box-shadow: 0 4px 20px rgba(74, 222, 128, 0.3);
        }

        .ad-button.rewarded:hover {
            box-shadow: 0 6px 25px rgba(74, 222, 128, 0.4);
        }

        .ad-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .ad-button:hover::before {
            left: 100%;
        }

        .ad-button.loading {
            pointer-events: none;
        }

        .ad-button.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .reward-badge {
            background: rgba(74, 222, 128, 0.2);
            border: 1px solid rgba(74, 222, 128, 0.3);
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 0.85rem;
            margin-top: 10px;
            text-align: center;
        }

        .status-message {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            font-size: 0.95rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .status-message.show {
            opacity: 1;
        }

        .status-message.success {
            background: rgba(74, 222, 128, 0.9);
        }

        .status-message.error {
            background: rgba(239, 68, 68, 0.9);
        }

        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(-3px);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .ads-grid {
                grid-template-columns: 1fr;
            }

            .points-value {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <button class="back-button" onclick="goBack()">← Voltar</button>

    <div class="container">
        <div class="header">
            <h1>🎬 Exibição de Anúncios</h1>
            <p>Teste e visualize diferentes tipos de anúncios</p>
        </div>

        <div class="points-display">
            <div class="points-label">Pontos Acumulados</div>
            <div class="points-value" id="pointsValue">0</div>
        </div>

        <div class="ads-grid">
            <!-- AdMob Section -->
            <div class="ad-network-card">
                <div class="network-title admob">AdMob</div>
                <div class="ad-buttons">
                    <!-- Banner removido - exibição automática ativa -->
                    <button class="ad-button" onclick="showAdMobInterstitial()">
                        🖼️ Interstitial
                    </button>
                    <button class="ad-button rewarded" onclick="showAdMobRewarded()">
                        🎁 Rewarded Video (+1 ponto)
                    </button>
                    <div class="reward-badge">
                        Ganhe 1 ponto por vídeo assistido
                    </div>
                </div>
            </div>

            <!-- MAX Section -->
            <div class="ad-network-card">
                <div class="network-title max">AppLovin MAX</div>
                <div class="ad-buttons">
                    <!-- Banner removido - exibição automática ativa -->
                    <button class="ad-button" onclick="showMaxInterstitial()">
                        🖼️ Interstitial
                    </button>
                    <button class="ad-button rewarded" onclick="showMaxRewarded()">
                        🎁 Rewarded Video (+1 ponto)
                    </button>
                    <div class="reward-badge">
                        Ganhe 1 ponto por vídeo assistido
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="status-message" id="statusMessage"></div>

    <script>
        let currentPoints = 0;

        // Função para enviar mensagem ao Unity
        function sendToUnity(path, params = {}) {
            const paramsStr = Object.keys(params)
                .map(key => `${key}=${encodeURIComponent(params[key])}`)
                .join('&');
            
            const url = `uniwebview://${path}${paramsStr ? '?' + paramsStr : ''}`;
            console.log('Enviando para Unity:', url);
            window.location.href = url;
        }

        // Função para mostrar mensagem de status
        function showStatus(message, type = 'info', duration = 3000) {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.className = `status-message show ${type}`;
            
            setTimeout(() => {
                statusEl.classList.remove('show');
            }, duration);
        }

        // Função para atualizar pontos
        function updatePoints(points) {
            currentPoints = points;
            const pointsEl = document.getElementById('pointsValue');
            pointsEl.textContent = currentPoints;
            
            // Animação de atualização
            pointsEl.style.transform = 'scale(1.2)';
            setTimeout(() => {
                pointsEl.style.transform = 'scale(1)';
            }, 300);
        }

        // Funções AdMob - Novo formato
        // showAdMobBanner removido - banner exibido automaticamente

        function showAdMobInterstitial() {
            showStatus('Exibindo Interstitial AdMob...', 'info');
            sendToUnity('showAd', { type: 'interstitial', network: 'admob' });
        }

        function showAdMobRewarded() {
            showStatus('Carregando Rewarded AdMob...', 'info');
            sendToUnity('showAd', { type: 'rewarded', network: 'admob' });
        }

        // Funções MAX - Novo formato
        // showMaxBanner removido - banner exibido automaticamente

        function showMaxInterstitial() {
            showStatus('Exibindo Interstitial MAX...', 'info');
            sendToUnity('showAd', { type: 'interstitial', network: 'max' });
        }

        function showMaxRewarded() {
            showStatus('Carregando Rewarded MAX...', 'info');
            sendToUnity('showAd', { type: 'rewarded', network: 'max' });
        }

        // Função para voltar
        function goBack() {
            // Fechar ou navegar para home - implementar conforme necessário
            if (window.history.length > 1) {
                window.history.back();
            }
        }

        // Callbacks do Unity - Novo formato
        window.onAdEvent = function(eventType, adType) {
            console.log('Evento de anúncio:', eventType, adType);
            
            switch(eventType) {
                case 'adShown':
                    showStatus(`✅ ${adType} exibido com sucesso!`, 'success', 2000);
                    break;
                    
                case 'adRewarded':
                    currentPoints += 1;
                    updatePoints(currentPoints);
                    showStatus(`✅ +1 ponto! (${adType})`, 'success', 4000);
                    // Notificar Unity sobre os pontos atualizados
                    sendToUnity('updatePoints', { points: currentPoints });
                    break;
                    
                case 'adFailed':
                    showStatus(`❌ ${adType} não disponível`, 'error');
                    break;
                    
                case 'adCanceled':
                    showStatus(`⚠️ ${adType} cancelado`, 'error');
                    break;
            }
        };

        // Função para atualizar pontos (chamada pelo Unity)
        window.updatePoints = function(points) {
            currentPoints = points;
            updatePoints(currentPoints);
        };

        // Carregar pontos iniciais
        function loadInitialPoints() {
            // Solicitar pontos atuais do Unity
            sendToUnity('getCurrentPoints');
        }

        // Função para exibir interstitial automático ao carregar
        function showAutoInterstitial() {
            // Verificar se há parâmetro na URL para escolher a rede ou desabilitar
            const urlParams = new URLSearchParams(window.location.search);
            const autoInterstitial = urlParams.get('autoInterstitial');
            
            // Se autoInterstitial=false, não executar
            if (autoInterstitial === 'false' || autoInterstitial === '0') {
                console.log('[adsExibition] Interstitial automático desabilitado via parâmetro');
                return;
            }
            
            const network = urlParams.get('autoNetwork') || 'max'; // Padrão: MAX
            
            // Pequeno delay para garantir que a página está totalmente carregada
            setTimeout(() => {
                console.log(`[adsExibition] Exibindo interstitial automático (${network})`);
                
                if (network.toLowerCase() === 'admob') {
                    showAdMobInterstitial();
                } else {
                    showMaxInterstitial();
                }
            }, 500); // Delay de 500ms após o carregamento
        }

        // Inicialização
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Página adsExibition carregada');
            loadInitialPoints();
            // Executar interstitial automático
            showAutoInterstitial();
        });

        // Prevenção de context menu
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        // Feedback tátil para mobile
        document.querySelectorAll('.ad-button').forEach(button => {
            button.addEventListener('touchstart', function() {
                this.style.transform = 'scale(0.95)';
            });
            
            button.addEventListener('touchend', function() {
                this.style.transform = 'scale(1)';
            });
        });
    </script>
</body>
</html>
